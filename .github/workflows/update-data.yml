name: Update KSC Data

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run data aggregator
        run: python scripts/update_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet Data.lua && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Bump version in TOC
        if: steps.changes.outputs.changed == 'true'
        run: |
          CURRENT=$(grep -oP '## Version: \K.*' KeystoneSynergyCheck.toc)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "s/## Version: .*/## Version: $NEW_VERSION/" KeystoneSynergyCheck.toc
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.lua KeystoneSynergyCheck.toc
          git commit -m "Update spec data $(date -u '+%Y-%m-%d')"
          git tag "v${{ steps.changes.outputs.version || '0.1.0' }}"
          git push
          git push --tags

      - name: Package and release
        if: steps.changes.outputs.changed == 'true'
        uses: BigWigsMods/packager@v2
        with:
          args: -z
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
